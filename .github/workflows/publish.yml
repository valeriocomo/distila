name: Publish Extension

on:
  push:
    tags:
      - 'v*'
  # release-please crea il tag con il GITHUB_TOKEN, i cui eventi non fanno
  # scattare altri workflow: il run su tag parte solo per tag pushati a mano.
  # Il flusso automatico passa da qui, dispatchato da release-please.yml.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da pubblicare (es. v1.2.3)'
        required: true
        type: string

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Build: a single versioned zip, shared by the two publish
  #    jobs via upload-artifact/download-artifact
  # ────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # su workflow_dispatch builda il tag richiesto, non main
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Extract version from tag
        id: version
        env:
          RAW_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          # Tag e.g. "v1.2.3" -> "1.2.3"
          TAG="${RAW_TAG#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set package.json version to match the tag
        run: npm pkg set version="${{ steps.version.outputs.version }}"

      - name: Sync version into manifest.json
        run: npm run sync-version

      - name: Build extension zip
        run: npm run build

      - name: Upload zip as shared artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: extension.zip

  # ────────────────────────────────────────────────────────────
  # 2. Publish to Chrome Web Store
  # ────────────────────────────────────────────────────────────
  publish-chrome:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download zip
        uses: actions/download-artifact@v4
        with:
          name: extension-package

      - name: Install chrome-webstore-upload-cli
        run: npm install -g chrome-webstore-upload-cli

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          chrome-webstore-upload upload \
            --source extension.zip \
            --extension-id "$EXTENSION_ID"

      - name: Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          chrome-webstore-upload publish \
            --extension-id "$EXTENSION_ID"

  # ────────────────────────────────────────────────────────────
  # 3. Publish to Microsoft Edge Add-ons
  #    Requires that the first submission has already been done
  #    manually from Partner Center (the Product ID is needed).
  # ────────────────────────────────────────────────────────────
  publish-edge:
    if: false  # Temporaneamente disabilitato: rimuovere questa riga per riattivare
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download zip
        uses: actions/download-artifact@v4
        with:
          name: extension-package

      - name: Upload and publish to Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: extension.zip
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}

  # ────────────────────────────────────────────────────────────
  # 4. Attach the built zip to the GitHub Release that
  #    release-please already created for this tag
  # ────────────────────────────────────────────────────────────
  release:
    needs: [build, publish-chrome]  # riaggiungere publish-edge quando viene riattivato
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download zip
        uses: actions/download-artifact@v4
        with:
          name: extension-package

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          # esplicito perché su workflow_dispatch github.ref è main
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: extension.zip